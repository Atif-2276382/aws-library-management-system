name: Deploy Backend

on:
  workflow_dispatch: # Strictly manual trigger

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build Jar
        run: mvn clean package -DskipTests

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t library-management-backend .

      - name: Tag Docker Image
        run: |
          docker tag library-management-backend:latest \
          ${{ secrets.ECR_REPOSITORY }}:latest

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.ECR_REPOSITORY }}:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            set -e

            # 1. Stop and remove existing container if running
            docker stop library-management || true
            docker rm library-management || true

            # 2. Log in using the automatic token from the ECR step
            echo "${{ steps.login-ecr.outputs.docker_username_password_blob_ecr_amazonaws_com }}" | \
            docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            # 3. Clean up the old image and pull the new one
            docker image rm ${{ secrets.ECR_REPOSITORY }}:latest || true
            docker pull ${{ secrets.ECR_REPOSITORY }}:latest

            # 4. Spin up the container
            docker run -d \
              --name library-management \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e SPRING_DATASOURCE_URL="${{ secrets.SPRING_DATASOURCE_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              ${{ secrets.ECR_REPOSITORY }}:latest

            # 5. Sanity checks
            docker ps
            sleep 10
            docker logs library-management --tail 100