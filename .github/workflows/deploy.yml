name: Deploy to AWS

on:
  push:
    branches:
      - main
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      S3_BUCKET: librarym-frontend-prod
      CLOUDFRONT_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
      EC2_INSTANCE_IP: ${{ secrets.EC2_INSTANCE_IP }}
      BACKEND_URL: ${{ secrets.BACKEND_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # Backend Build & Push
      - name: Build backend with Maven
        run: |
          cd backend
          mvn clean package -DskipTests
          
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/librarym-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/librarym-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend Build & Deploy
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          VITE_API_URL=${{ env.BACKEND_URL }} npm run build

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/dist s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=300" \
            --exclude "*.html" \
            --exclude "*.json"
          
          aws s3 sync frontend/dist s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" \
            --include "*.json"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_ID }} \
            --paths "/*"

      # Backend Deploy to EC2
      - name: Deploy backend to EC2
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.EC2_INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # Pull latest image and restart
            docker pull ${{ secrets.DOCKER_USERNAME }}/librarym-backend:latest
            docker stop libraryms || true
            docker rm libraryms || true
            docker run -d \
              --name libraryms \
              --restart always \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }} \
              -e SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              ${{ secrets.DOCKER_USERNAME }}/librarym-backend:latest
            
            # Wait for health check
            sleep 10
            curl http://localhost:8080/actuator/health || exit 1

      # Health check
      - name: Health check
        run: |
          curl -f ${{ env.BACKEND_URL }}/actuator/health || exit 1
          curl -f https://d123.cloudfront.net || exit 1

