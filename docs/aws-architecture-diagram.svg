<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" width="1400" height="920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffbeb"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1400" height="920" fill="url(#bg)"/>
  <text x="700" y="42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Library Management System - AWS Deployment Architecture</text>
  <text x="700" y="68" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">React on S3/CloudFront | Spring Boot on ECS Fargate | RDS MySQL</text>

  <!-- Users -->
  <rect x="610" y="95" width="180" height="56" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="128" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#1e3a8a">End Users</text>

  <!-- AWS Cloud boundary -->
  <rect x="60" y="175" width="1280" height="680" rx="20" fill="#fff7ed" stroke="#f97316" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="90" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#9a3412">AWS Cloud</text>

  <!-- Edge / Frontend -->
  <rect x="90" y="230" width="380" height="300" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="280" y="260" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Frontend Delivery</text>

  <rect x="120" y="285" width="320" height="56" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="280" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#92400e">Amazon CloudFront (CDN)</text>
  <text x="280" y="328" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#475569">HTTPS + SPA routing</text>

  <rect x="120" y="355" width="320" height="56" rx="10" fill="#dcfce7" stroke="#16a34a"/>
  <text x="280" y="380" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#166534">Amazon S3</text>
  <text x="280" y="398" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#475569">React build (static assets)</text>

  <rect x="120" y="425" width="320" height="56" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="280" y="450" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#5b21b6">AWS Certificate Manager</text>
  <text x="280" y="468" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#475569">TLS for app.yourdomain.com</text>

  <!-- API / Compute -->
  <rect x="500" y="230" width="420" height="420" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="710" y="260" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Backend Compute</text>

  <rect x="530" y="285" width="360" height="50" rx="10" fill="#fee2e2" stroke="#ef4444"/>
  <text x="710" y="315" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#991b1b">AWS WAF (optional)</text>

  <rect x="530" y="350" width="360" height="56" rx="10" fill="#dbeafe" stroke="#2563eb"/>
  <text x="710" y="375" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#1d4ed8">Application Load Balancer</text>
  <text x="710" y="393" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#475569">api.yourdomain.com</text>

  <rect x="530" y="425" width="170" height="56" rx="10" fill="#ecfeff" stroke="#0891b2"/>
  <text x="615" y="450" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#155e75">Amazon ECR</text>
  <text x="615" y="468" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#475569">Docker images</text>

  <rect x="720" y="425" width="170" height="56" rx="10" fill="#ecfeff" stroke="#0891b2"/>
  <text x="805" y="450" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#155e75">ECS Fargate</text>
  <text x="805" y="468" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#475569">Spring Boot API</text>

  <rect x="530" y="500" width="360" height="70" rx="10" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="710" y="525" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#166534">Spring Boot Services</text>
  <text x="710" y="545" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#475569">Auth/JWT, RBAC, Books, Authors, Members, Lendings, Notifications</text>

  <rect x="530" y="585" width="170" height="50" rx="10" fill="#f1f5f9" stroke="#64748b"/>
  <text x="615" y="615" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#334155">Rate Limiting</text>

  <rect x="720" y="585" width="170" height="50" rx="10" fill="#f1f5f9" stroke="#64748b"/>
  <text x="805" y="615" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#334155">Actuator Health</text>

  <!-- Data & Security -->
  <rect x="950" y="230" width="360" height="420" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="1130" y="260" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Data, Security &amp; Ops</text>

  <ellipse cx="1130" cy="330" rx="110" ry="45" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="1130" y="328" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">Amazon RDS</text>
  <text x="1130" y="348" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#475569">MySQL (library_db)</text>

  <rect x="980" y="395" width="300" height="50" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="1130" y="425" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#92400e">AWS Secrets Manager</text>

  <rect x="980" y="460" width="300" height="50" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="1130" y="490" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#5b21b6">Amazon CloudWatch</text>

  <rect x="980" y="525" width="140" height="50" rx="10" fill="#fce7f3" stroke="#db2777"/>
  <text x="1050" y="555" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#9d174d">Amazon SNS</text>

  <rect x="1140" y="525" width="140" height="50" rx="10" fill="#fce7f3" stroke="#db2777"/>
  <text x="1210" y="555" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#9d174d">EventBridge</text>

  <rect x="980" y="590" width="300" height="50" rx="10" fill="#f1f5f9" stroke="#64748b"/>
  <text x="1130" y="620" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#334155">IAM Roles + KMS Encryption</text>

  <!-- CI/CD -->
  <rect x="90" y="560" width="380" height="120" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="280" y="590" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">CI/CD Pipeline</text>
  <text x="280" y="620" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">GitHub � GitHub Actions</text>
  <text x="280" y="642" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">Build/Test � Push ECR � Deploy ECS � Sync S3 � Invalidate CloudFront</text>

  <!-- DNS -->
  <rect x="90" y="700" width="1220" height="120" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="120" y="730" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Traffic &amp; Domains</text>
  <text x="120" y="758" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">app.yourdomain.com � CloudFront � S3 (React UI)</text>
  <text x="120" y="780" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">api.yourdomain.com � Route 53 � ALB � ECS Fargate (Spring Boot API)</text>
  <text x="120" y="802" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">Frontend calls API via VITE_API_URL=https://api.yourdomain.com with JWT + CORS</text>

  <!-- Arrows -->
  <line x1="700" y1="151" x2="280" y2="230" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="470" y="185" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">HTTPS UI</text>

  <line x1="700" y1="151" x2="710" y2="230" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="730" y="185" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">HTTPS API</text>

  <line x1="440" y1="383" x2="500" y2="383" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="470" y="373" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">REST + JWT</text>

  <line x1="920" y1="530" x2="950" y2="340" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="935" y="430" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">JDBC</text>

  <line x1="280" y1="560" x2="615" y2="480" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="280" y1="560" x2="280" y2="425" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
