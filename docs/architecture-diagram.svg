<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="1200" height="780">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="780" fill="url(#bg)"/>
  <text x="600" y="42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Library Management System - High Level Architecture</text>
  <text x="600" y="68" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">React UI | Spring Boot API | MySQL | Docker</text>

  <!-- User -->
  <rect x="500" y="95" width="200" height="56" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="128" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#1e3a8a">Users (Browser)</text>

  <!-- Frontend box -->
  <rect x="80" y="190" width="360" height="300" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Frontend Layer</text>

  <rect x="110" y="245" width="300" height="58" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="260" y="270" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#1d4ed8">React (Vite)</text>
  <text x="260" y="290" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">Login, Books, Authors, Members, Lendings</text>

  <rect x="110" y="320" width="300" height="58" rx="10" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="260" y="345" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#166534">Nginx (Production)</text>
  <text x="260" y="365" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">Static files + /api proxy</text>

  <rect x="110" y="395" width="300" height="58" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="260" y="420" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#92400e">Auth Context (JWT)</text>
  <text x="260" y="440" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">Role-based UI: Librarian / Member</text>

  <!-- Backend box -->
  <rect x="470" y="190" width="360" height="420" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="650" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Backend Layer (Spring Boot)</text>

  <rect x="500" y="245" width="300" height="50" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="650" y="275" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#5b21b6">REST Controllers</text>

  <rect x="500" y="310" width="140" height="50" rx="10" fill="#fce7f3" stroke="#db2777"/>
  <text x="570" y="340" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#9d174d">Auth + JWT</text>

  <rect x="660" y="310" width="140" height="50" rx="10" fill="#fce7f3" stroke="#db2777"/>
  <text x="730" y="340" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#9d174d">RBAC Security</text>

  <rect x="500" y="375" width="300" height="70" rx="10" fill="#ecfeff" stroke="#0891b2"/>
  <text x="650" y="400" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#155e75">Business Services</text>
  <text x="650" y="420" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#475569">Books | Authors | Members | Lendings | Notifications</text>

  <rect x="500" y="460" width="140" height="50" rx="10" fill="#f1f5f9" stroke="#64748b"/>
  <text x="570" y="490" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#334155">Rate Limiting</text>

  <rect x="660" y="460" width="140" height="50" rx="10" fill="#f1f5f9" stroke="#64748b"/>
  <text x="730" y="490" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#334155">Scheduler</text>

  <rect x="500" y="525" width="300" height="50" rx="10" fill="#fff7ed" stroke="#ea580c"/>
  <text x="650" y="555" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#9a3412">JPA Repositories + Exception Handler</text>

  <!-- Database box -->
  <rect x="860" y="190" width="260" height="300" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="990" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Data Layer</text>

  <ellipse cx="990" cy="290" rx="95" ry="42" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="990" y="288" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">MySQL</text>
  <text x="990" y="306" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#475569">library_db</text>

  <text x="990" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#334155">users | authors | books</text>
  <text x="990" y="380" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#334155">members | lendings | notifications</text>

  <!-- DevOps box -->
  <rect x="470" y="640" width="650" height="100" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <text x="795" y="670" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Deployment &amp; Operations</text>
  <text x="795" y="700" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">Docker Compose (MySQL + Backend + Frontend/Nginx) | GitHub Actions CI | Actuator Health/Metrics | Logging</text>

  <!-- Arrows -->
  <line x1="600" y1="151" x2="260" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="410" y1="350" x2="470" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="340" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">/api</text>
  <line x1="830" y1="400" x2="860" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="845" y="355" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">JDBC</text>

  <!-- Legend -->
  <rect x="80" y="640" width="360" height="100" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="100" y="665" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">Key Flows</text>
  <text x="100" y="690" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">1. User logs in and receives JWT token</text>
  <text x="100" y="710" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">2. UI calls REST APIs with Bearer token</text>
  <text x="100" y="730" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">3. Backend enforces RBAC and business rules</text>
</svg>
