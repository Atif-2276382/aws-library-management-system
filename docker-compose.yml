version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: librarym-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: library_db
      MYSQL_USER: library_user
      MYSQL_PASSWORD: library_pass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: librarym-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/library_db
      SPRING_DATASOURCE_USERNAME: library_user
      SPRING_DATASOURCE_PASSWORD: library_pass123
      JWT_SECRET: your-secret-key-change-this-in-production
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - librarym-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api
    container_name: librarym-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - librarym-network

volumes:
  mysql_data:
    driver: local

networks:
  librarym-network:
    driver: bridge
