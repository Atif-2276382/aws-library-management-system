server:
  port: 8080

spring:
  application:
    name: library-management
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:mysql://localhost:3306/library_schema?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:library-management-jwt-secret-key-256-bits-min}
    expiration-ms: 86400000
  rate-limit:
    per-minute: 120
  email:
    from: 313atifk@gmail.com
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
scheduler:
  secret: library-scheduler-secret-2026
    
logging:
  level:
    root: INFO
    com.library: DEBUG
